apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: kitchen
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://kitchen-api:3000/;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Kitchen Orders</title>
      <script>
        const API_BASE_URL = "/api";

        async function loadOrders() {
          const res = await fetch(`${API_BASE_URL}/orders`);
          const data = await res.json();
          const tbody = document.getElementById("orders");

          // Build the entire HTML string first, then update the DOM once for better performance
          tbody.innerHTML = data.map(o => `
            <tr>
              <td>${o.dish}</td>
              <td>${o.status}</td>
              <td>
                <button onclick="deleteOrder('${o.id || o._id}')">Delete</button>
              </td>
            </tr>
          `).join("");
        }

        async function createOrder() {
          const dish = document.getElementById("dish").value;
          
          await fetch(`${API_BASE_URL}/orders`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dish })
          });
          
          loadOrders();
        }

        async function deleteOrder(id) {
          await fetch(`${API_BASE_URL}/orders/${id}`, { 
            method: "DELETE" 
          });
          
          loadOrders();
        }

        // Initial load and polling
        loadOrders();
        setInterval(loadOrders, 3000);
      </script>
    </head>
    <body>
      <h1>Kitchen Orders</h1>

      <input id="dish" placeholder="Dish name"/>
      <button onclick="createOrder()">Create</button>

      <table>
        <thead>
          <tr>
            <th>Dish</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orders"></tbody>
      </table>

      <script>
        const api="/api";

        async function loadOrders(){
          const res = await fetch(api + "/orders");
          const data = await res.json();
          const tbody=document.getElementById("orders");
          tbody.innerHTML="";
          data.forEach(o=>{
            const row=`<tr><td>${o.dish}</td><td>${o.status}</td></tr>`;
            tbody.innerHTML+=row;
          });
        }

        async function createOrder(){
          const dish=document.getElementById("dish").value;
          await fetch(api + "/orders",{
            method:"POST",
            headers:{ "Content-Type":"application/json"},
            body:JSON.stringify({dish})
          });
          loadOrders();
        }

        loadOrders();
      </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
      - name: kitchen-web-ui
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-ui-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: web-ui-config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: web-ui-config
        configMap:
          name: web-ui-config

---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080